[workspace]
name = "dl2-head-tracking"
version = "0.1.0"
description = "Head tracking mod for Dying Light 2 using CameraUnlock shared library"
channels = ["conda-forge"]
platforms = ["win-64"]

[tasks]
# Setup CMake build (x64 for DL2)
setup = { cmd = """
    powershell -Command "if (-not (Test-Path 'build')) { cmake -B build -G 'Visual Studio 17 2022' -A x64 } else { Write-Host 'Build directory exists, skipping setup' -ForegroundColor Yellow }"
""" }

# Build debug configuration
build = { cmd = "cmake --build build --config Debug", depends-on = ["setup"] }

# Build release configuration
build-release = { cmd = "cmake --build build --config Release", depends-on = ["setup"] }

# Deploy debug build to game directory
deploy = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Debug", depends-on = ["build"] }

# Deploy release build to game directory
deploy-release = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy-release.ps1", depends-on = ["build-release"] }

# Deploy only the config file (for quick settings changes without rebuilding)
deploy-config = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy-config.ps1" }

# Detect game installation path
detect-game = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/detect-game.ps1" }

# Clean build artifacts
clean = { cmd = """
    powershell -Command "if (Test-Path 'build') { Remove-Item 'build' -Recurse -Force }; Write-Host 'Build artifacts cleaned' -ForegroundColor Green"
""" }

# Full clean including release output
clean-all = { cmd = """
    powershell -Command "if (Test-Path 'build') { Remove-Item 'build' -Recurse -Force }; if (Test-Path 'release') { Remove-Item 'release' -Recurse -Force }; Write-Host 'All build artifacts cleaned' -ForegroundColor Green"
""" }

# Validate release readiness
validate-release = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/validate-release.ps1" }

# Package release ZIP
package = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1", depends-on = ["build-release"] }

# Automated release workflow
release = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1" }
release-force = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1 -Force" }

# Preview changelog for next release
show-changelog = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/show-changelog.ps1" }

# Revert release operations
unrelease = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/unrelease.ps1" }

# Build + deploy release to game directory
install = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Release", depends-on = ["build-release"] }

# Remove HeadTracking mod only (keeps modding framework)
uninstall = "scripts\\uninstall.cmd"

# Test UDP receiver with simulated OpenTrack data
test-udp = { cmd = "python scripts/test-udp-receiver.py --test && python scripts/test-udp-receiver.py --yaw 45 --pitch 30 --roll 15" }

# Send continuous simulated tracking data for live testing
test-udp-continuous = { cmd = "python scripts/test-udp-receiver.py --continuous --rate 120" }

[dependencies]
# No pixi dependencies - using system CMake and Visual Studio
