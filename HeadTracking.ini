; DL2 Head Tracking Configuration
; Delete this file to reset to defaults

[Network]
; UDP port for OpenTrack data (default: 4242)
UDPPort=4242

[Sensitivity]
; Rotation sensitivity multipliers (1.0 = 1:1)
YawMultiplier=1.0
PitchMultiplier=1.0
RollMultiplier=1.0

[Position]
; Position tracking sensitivity (0.1-10.0, higher = more movement)
SensitivityX=2.0
SensitivityY=2.0
SensitivityZ=2.0
; Position limits in meters (how far the camera can move)
LimitX=0.30
LimitY=0.20
LimitZ=0.40
; Backward lean limit (prevents camera clipping through player model)
LimitZBack=0.10
; Smoothing factor (0.0 = none, 0.99 = maximum)
Smoothing=0.15
; Invert position axes
InvertX=false
InvertY=false
InvertZ=false
; Enable/disable position tracking (6DOF)
Enabled=true

[Hotkeys]
; Virtual key codes (hex). Every action also has a Ctrl+Shift+<letter>
; chord fallback (see README).
ToggleKey=0x23    ; End - Enable/disable head tracking
RecenterKey=0x24  ; Home - Recenter view
PositionToggleKey=0x21 ; Page Up - Toggle position tracking
YawModeKey=0x22   ; Page Down - Toggle yaw mode (camera-local / world-locked)
ReticleToggleKey=0x2d  ; Insert - Toggle reticle

[Rotation]
; Yaw rotation frame.
;   false = camera-local (default) - yaw rotates around head-up; pitched-down
;          yaw sweeps a cone and tilts the horizon.
;   true  = world-locked - yaw rotates around world-up; horizon stays level.
WorldLockedYaw=false

[Reticle]
; Show the head tracking reticle overlay
Enabled=true

[General]
; Auto-enable tracking on game start
AutoEnable=true
; Show on-screen notifications
ShowNotifications=true
